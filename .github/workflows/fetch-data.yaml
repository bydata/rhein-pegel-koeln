name: get-water-level
on:
  schedule: 
    - cron: '0 * * * *'
    
jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up German locale
        run: |
          sudo locale-gen de_DE.UTF-8
          sudo update-locale LANG=de_DE.UTF-8

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install packages
        run: |
          R -e 'install.packages(c("xml2", "purrr", "dplyr", "stringr", "testthat"), repos = "https://cloud.r-project.org")'

      - name: Fetch result
        run: Rscript R/fetch-data.R

      - name: Combine datasets
        run: Rscript R/merge-data.R

      - name: Delete raw file
        run: rm data/fetched-results/*

      - name: Commit files
        run: |
          git config --local user.name "actions-user"
          git config --local user.email "actions@github.com"
          git pull --rebase origin main
          git add data/*
          git diff --staged --quiet || git commit -m "Data fetch for $(date)"
          git push origin main
        env:
          REPO_KEY: ${{secrets.GITHUB_TOKEN}}
          username: github-actions
